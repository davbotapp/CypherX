name: Deploy WhatsApp Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Start Bot
      run: |
        echo "Starting WhatsApp Bot..."
        # Lance le bot et redirige stdout/stderr dans un fichier log
        nohup node index.js > bot.log 2>&1 &
        sleep 5
        # Affiche les 50 dernières lignes du log
        tail -n 50 bot.log
